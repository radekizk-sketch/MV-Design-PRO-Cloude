name: frontend-e2e-smoke

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend-e2e-smoke.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/frontend-e2e-smoke.yml'

jobs:
  critical-real-backend-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: '1.8.3'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install backend + browser deps
        working-directory: frontend
        run: npm run test:e2e:setup:real

      - name: Run critical E2E on real backend
        working-directory: frontend
        run: npm run test:e2e:real
