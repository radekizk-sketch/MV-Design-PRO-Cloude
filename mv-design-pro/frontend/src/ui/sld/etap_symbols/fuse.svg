<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fuse / Bezpiecznik - IEC 60617 -->
  <!-- Rectangle with thin center fuse element -->
  <!-- Connection stub top -->
  <line x1="50" y1="0" x2="50" y2="30" stroke="#000000" stroke-width="3"/>
  <!-- Fuse body rectangle -->
  <rect x="30" y="30" width="40" height="40" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Thin fuse element inside -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="#000000" stroke-width="1.5"/>
  <!-- Connection stub bottom -->
  <line x1="50" y1="70" x2="50" y2="100" stroke="#000000" stroke-width="3"/>
  <!-- Port markers: top: (50, 0), bottom: (50, 100) -->
</svg>
