<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Metering Cubicle / Pole pomiarowe - IEC 60617 -->
  <!-- Rectangle with kWh circle inside -->
  <!-- Connection stub top -->
  <line x1="50" y1="0" x2="50" y2="20" stroke="#000000" stroke-width="3"/>
  <!-- Outer rectangle -->
  <rect x="25" y="20" width="50" height="60" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Inner metering circle -->
  <circle cx="50" cy="50" r="15" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- kWh label -->
  <text x="50" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000000">kWh</text>
  <!-- Connection stub bottom -->
  <line x1="50" y1="80" x2="50" y2="100" stroke="#000000" stroke-width="3"/>
  <!-- Port markers: top: (50, 0), bottom: (50, 100) -->
</svg>
