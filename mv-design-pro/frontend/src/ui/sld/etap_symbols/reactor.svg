<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Reactor / Dławik - IEC 60617 -->
  <!-- Coil: 3 half-arcs (semicircles) stacked vertically -->
  <!-- Connection stub top -->
  <line x1="50" y1="0" x2="50" y2="25" stroke="#000000" stroke-width="3"/>
  <!-- 3 semicircular arcs forming coil -->
  <path d="M50,25 A8,8 0 0,1 50,41 A8,8 0 0,1 50,57 A8,8 0 0,1 50,73" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Connection stub bottom -->
  <line x1="50" y1="73" x2="50" y2="100" stroke="#000000" stroke-width="3"/>
  <!-- Port markers: top: (50, 0), bottom: (50, 100) -->
</svg>
