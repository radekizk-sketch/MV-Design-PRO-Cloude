<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Surge Arrester / Ogranicznik przepiec - IEC 60617 -->
  <!-- Gap + varistor body + ground -->
  <!-- Connection stub top -->
  <line x1="50" y1="0" x2="50" y2="25" stroke="#000000" stroke-width="3"/>
  <!-- Gap: two short horizontal lines -->
  <line x1="40" y1="25" x2="60" y2="25" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="30" x2="60" y2="30" stroke="#000000" stroke-width="2"/>
  <!-- Varistor body rectangle -->
  <rect x="35" y="30" width="30" height="35" fill="none" stroke="#000000" stroke-width="2"/>
  <!-- Zigzag varistor symbol inside -->
  <polyline points="42,35 50,42 58,35 50,42 42,49 50,56 58,49 50,56 42,60" fill="none" stroke="#000000" stroke-width="1.5"/>
  <!-- Connection stub bottom -->
  <line x1="50" y1="65" x2="50" y2="80" stroke="#000000" stroke-width="3"/>
  <!-- Ground symbol: 3 descending horizontal lines -->
  <line x1="35" y1="80" x2="65" y2="80" stroke="#000000" stroke-width="3"/>
  <line x1="40" y1="87" x2="60" y2="87" stroke="#000000" stroke-width="2.5"/>
  <line x1="45" y1="94" x2="55" y2="94" stroke="#000000" stroke-width="2"/>
  <!-- Port markers: top: (50, 0) -->
</svg>
