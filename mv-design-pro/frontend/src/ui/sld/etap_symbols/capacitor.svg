<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Capacitor / Kondensator - IEC 60617 -->
  <!-- Two parallel plates -->
  <!-- Connection stub top -->
  <line x1="50" y1="0" x2="50" y2="40" stroke="#000000" stroke-width="3"/>
  <!-- Plate 1 (open plate) -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#000000" stroke-width="3"/>
  <!-- Plate 2 (filled plate) -->
  <line x1="30" y1="50" x2="70" y2="50" stroke="#000000" stroke-width="3"/>
  <!-- Connection stub bottom -->
  <line x1="50" y1="50" x2="50" y2="100" stroke="#000000" stroke-width="3"/>
  <!-- Port markers: top: (50, 0), bottom: (50, 100) -->
</svg>
